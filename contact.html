<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-enter-forward">
    <nav class="navbar">
        <div class="nav-brand">BlakeHQ</div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="yield.html" class="nav-link">Yield Strategies</a></li>
            <li><a href="experience.html" class="nav-link">Experience</a></li>
            <li><a href="contact.html" class="nav-link active">Contact</a></li>
        </ul>
    </nav>
    <main id="main-content">
        <section id="contact" class="page-section">
            <div class="content-wrapper scroll-reveal">
                <h2 class="section-title">Get In Touch</h2>
                <p class="section-subtitle">Let's build something amazing together.</p>
                <p class="contact-info"><strong>Email:</strong> blakeoberle777@gmail.com</p>

                <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent!');">
                    <div class="form-group">
                        <input type="text" placeholder="Your Name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Your Email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" placeholder="Phone Number" class="form-input">
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Your Message" class="form-input" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary submit-btn">Send Message</button>
                </form>
            </div>
            <div class="background-shape shape-4"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
